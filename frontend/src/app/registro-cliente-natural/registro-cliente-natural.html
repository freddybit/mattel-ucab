<div class="page">
  <div class="glass-panel">
    <!-- Header -->
    <div class="p-6 border-b border-white/10 flex justify-between items-center bg-[#0F172A]">
      <div>
        <h2 class="text-xl font-bold text-white flex items-center gap-3">
          <span class="material-symbols-outlined text-[#FF4D94]">person_add</span>
          Registrar Cliente Natural
        </h2>
        <p class="text-sm text-[#94A3B8] mt-1">Creación de nuevo perfil de consumidor en el sistema MattelUCAB.</p>
      </div>
      <a routerLink="/login" class="p-2 hover:bg-white/5 rounded-full transition-colors text-[#94A3B8]">
        <span class="material-symbols-outlined">close</span>
      </a>
    </div>

    <!-- Error Message -->
    @if (errorMsg) {
      <div class="mx-8 mt-6 flex items-center gap-2 px-4 py-3 rounded-lg text-sm font-medium text-[#ba1a1a] bg-[#ffdad6] border border-[#ba1a1a]/20">
        <span class="material-symbols-outlined text-[18px]">error</span>
        <span>{{ errorMsg }}</span>
      </div>
    }

    <!-- Content Area (Scrollable) -->
    <div class="p-8 overflow-y-auto modal-content space-y-10">
      <!-- SECCIÓN A: CUENTA -->
      <section>
        <div class="flex items-center gap-3 mb-6">
          <div class="h-px flex-1 bg-white/5"></div>
          <span class="text-[11px] font-bold uppercase tracking-[0.2em] text-[#ffb0cc]/70 px-3 py-1 rounded bg-[#ffb0cc]/5 border border-[#ffb0cc]/20">Sección A: Cuenta</span>
          <div class="h-px flex-1 bg-white/5"></div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-6">
          <div class="space-y-1.5">
            <label class="input-label">Nombre de Usuario *</label>
            <input class="w-full h-11 px-4 rounded-lg input-field" name="nombreUsuario" placeholder="ej: jmason2026" type="text" [(ngModel)]="form.nombreUsuario"/>
          </div>
          <div class="space-y-1.5">
            <label class="input-label">Correo Electrónico *</label>
            <input class="w-full h-11 px-4 rounded-lg input-field" name="correoElectronico" placeholder="usuario&#64;dominio.com" type="email" [(ngModel)]="form.correoElectronico"/>
          </div>
          <div class="space-y-1.5">
            <label class="input-label">Contraseña *</label>
            <input class="w-full h-11 px-4 rounded-lg input-field" name="password" placeholder="••••••••" type="password" [(ngModel)]="form.password"/>
          </div>
          <div class="space-y-1.5">
            <label class="input-label">Confirmar Contraseña *</label>
            <input class="w-full h-11 px-4 rounded-lg input-field" name="confirmPassword" placeholder="••••••••" type="password" [(ngModel)]="form.confirmPassword"/>
          </div>
        </div>
      </section>

      <!-- SECCIÓN B: PERFIL PERSONAL -->
      <section>
        <div class="flex items-center gap-3 mb-6">
          <div class="h-px flex-1 bg-white/5"></div>
          <span class="text-[11px] font-bold uppercase tracking-[0.2em] text-[#ffb0cc]/70 px-3 py-1 rounded bg-[#ffb0cc]/5 border border-[#ffb0cc]/20">Sección B: Perfil Personal</span>
          <div class="h-px flex-1 bg-white/5"></div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-6">
          <div class="space-y-1.5">
            <label class="input-label">Cédula de Identidad *</label>
            <div class="flex h-11">
              <select class="w-24 rounded-l-lg input-field border-r-0 focus:z-10 appearance-none text-center bg-[#1E293B]" name="tipoCedula" [(ngModel)]="form.tipoCedula">
                <option>V</option>
                <option>E</option>
                <option>P</option>
              </select>
              <input class="flex-1 rounded-r-lg input-field border-l border-l-[#334155]/30 focus:z-10" placeholder="24123456" type="number" name="cedula" [(ngModel)]="form.cedula"/>
            </div>
          </div>
          <div class="space-y-1.5">
            <label class="input-label">Género</label>
            <select class="w-full h-11 px-4 rounded-lg input-field bg-[#1E293B]" name="genero" [(ngModel)]="form.genero">
              <option>Masculino</option>
              <option>Femenino</option>
              <option>Otros</option>
            </select>
          </div>
          <div class="space-y-1.5">
            <label class="input-label">Primer Nombre *</label>
            <input class="w-full h-11 px-4 rounded-lg input-field" name="pNombre" type="text" [(ngModel)]="form.pNombre"/>
          </div>
          <div class="space-y-1.5">
            <label class="input-label">Segundo Nombre (Opcional)</label>
            <input class="w-full h-11 px-4 rounded-lg input-field" name="sNombre" type="text" [(ngModel)]="form.sNombre"/>
          </div>
          <div class="space-y-1.5">
            <label class="input-label">Primer Apellido *</label>
            <input class="w-full h-11 px-4 rounded-lg input-field" name="pApellido" type="text" [(ngModel)]="form.pApellido"/>
          </div>
          <div class="space-y-1.5">
            <label class="input-label">Segundo Apellido (Opcional)</label>
            <input class="w-full h-11 px-4 rounded-lg input-field" name="sApellido" type="text" [(ngModel)]="form.sApellido"/>
          </div>
        </div>
      </section>

      <!-- SECCIÓN C: CONTACTO -->
      <section>
        <div class="flex items-center gap-3 mb-6">
          <div class="h-px flex-1 bg-white/5"></div>
          <span class="text-[11px] font-bold uppercase tracking-[0.2em] text-[#ffb0cc]/70 px-3 py-1 rounded bg-[#ffb0cc]/5 border border-[#ffb0cc]/20">Sección C: Contacto</span>
          <div class="h-px flex-1 bg-white/5"></div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6">
          <div class="space-y-1.5">
            <label class="input-label">Teléfono Celular</label>
            <div class="flex gap-2">
              <input class="w-20 h-11 text-center rounded-lg input-field bg-[#1E293B]/50" disabled name="codigoPais" type="text" value="+58"/>
              <select class="w-28 h-11 px-2 rounded-lg input-field bg-[#1E293B]" name="codigoOperadora" [(ngModel)]="form.codigoOperadora">
                <option>0414</option>
                <option>0424</option>
                <option>0412</option>
                <option>0416</option>
                <option>0426</option>
              </select>
              <input class="flex-1 h-11 px-4 rounded-lg input-field" maxlength="7" name="numeroAbonado" placeholder="7 dígitos" type="text" [(ngModel)]="form.numeroAbonado"/>
            </div>
          </div>
          <div class="space-y-1.5">
            <label class="input-label">Fecha de Nacimiento</label>
            <input class="w-full h-11 px-4 rounded-lg input-field" style="color-scheme: dark" type="date" name="fechaNacimiento" [(ngModel)]="form.fechaNacimiento"/>
          </div>
        </div>
      </section>

      <!-- SECCIÓN D: DESPACHO -->
      <section>
        <div class="flex items-center gap-3 mb-6">
          <div class="h-px flex-1 bg-white/5"></div>
          <span class="text-[11px] font-bold uppercase tracking-[0.2em] text-[#ffb0cc]/70 px-3 py-1 rounded bg-[#ffb0cc]/5 border border-[#ffb0cc]/20">Sección D: Despacho</span>
          <div class="h-px flex-1 bg-white/5"></div>
        </div>
        <div class="space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="space-y-1.5">
              <label class="input-label">Estado</label>
              <select class="w-full h-11 px-4 rounded-lg input-field bg-[#1E293B]" name="estado" [(ngModel)]="form.estado">
                <option value="">Seleccione...</option>
                <option>Distrito Capital</option>
                <option>Miranda</option>
                <option>Carabobo</option>
              </select>
            </div>
            <div class="space-y-1.5">
              <label class="input-label">Municipio</label>
              <select class="w-full h-11 px-4 rounded-lg input-field bg-[#1E293B]" [class.opacity-50]="!form.estado" [disabled]="!form.estado" name="municipio" [(ngModel)]="form.municipio">
                <option value="">Seleccione estado primero</option>
              </select>
            </div>
            <div class="space-y-1.5">
              <label class="input-label">Parroquia</label>
              <select class="w-full h-11 px-4 rounded-lg input-field bg-[#1E293B]" [class.opacity-50]="!form.municipio" [disabled]="!form.municipio" name="parroquia" [(ngModel)]="form.parroquia">
                <option value="">Seleccione municipio primero</option>
              </select>
            </div>
          </div>
          <div class="space-y-1.5">
            <label class="input-label">Punto de Referencia (Dirección Detallada)</label>
            <textarea class="w-full p-4 rounded-lg input-field min-h-[100px] resize-none" placeholder="Avenida, Edificio, Piso, Apto, Punto de referencia..." name="direccion" [(ngModel)]="form.direccion"></textarea>
          </div>
        </div>
      </section>
    </div>

    <!-- Footer Buttons -->
    <div class="p-6 bg-[#171f33] border-t border-white/5 flex justify-end items-center gap-4">
      <a routerLink="/login" class="px-8 py-2.5 rounded-lg border border-white/20 text-[#94A3B8] hover:bg-white/5 hover:text-white transition-all font-bold text-sm">
        Cancelar
      </a>
      <button class="px-8 py-2.5 rounded-lg text-white font-bold flex items-center gap-2 text-sm btn-primary" [disabled]="loading" (click)="submit()">
        @if (loading) {
          <span class="material-symbols-outlined text-[20px] spin" style="font-variation-settings: 'FILL' 1;">progress_activity</span>
          <span>Registrando...</span>
        } @else {
          <span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">save</span>
          <span>Guardar Genoma</span>
        }
      </button>
    </div>
  </div>
</div>
