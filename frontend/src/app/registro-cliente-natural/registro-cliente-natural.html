<div class="page">
  <div class="glass-panel">
    <div class="p-6 border-b border-white/10 flex justify-between items-center bg-[#0F172A]">
      <div>
        <h2 class="text-xl font-bold text-white flex items-center gap-3">
          <span class="material-symbols-outlined text-[#FF4D94]">person_add</span>
          Registrar Cliente Natural
        </h2>
        <p class="text-sm text-[#94A3B8] mt-1">Creación de nuevo perfil de consumidor en el sistema MattelUCAB.</p>
      </div>
      <a routerLink="/login" class="p-2 hover:bg-white/5 rounded-full transition-colors text-[#94A3B8]">
        <span class="material-symbols-outlined">close</span>
      </a>
    </div>

    @if (errorMsg) {
      <div class="mx-8 mt-6 flex items-center gap-2 px-4 py-3 rounded-lg text-sm font-medium text-[#ba1a1a] bg-[#ffdad6] border border-[#ba1a1a]/20">
        <span class="material-symbols-outlined text-[18px]">error</span>
        <span>{{ errorMsg }}</span>
      </div>
    }

    <div class="p-8 overflow-y-auto modal-content space-y-10">

      <section>
        <h3 class="text-sm font-bold text-[#FF4D94] uppercase tracking-widest mb-4 flex items-center gap-2">
          <span class="material-symbols-outlined text-[18px]">badge</span> Credenciales de Acceso
        </h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-1.5">
            <label class="input-label">Nombre de Usuario (Username)</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-[#64748B]">alternate_email</span>
              <input type="text" class="w-full pl-11 pr-4 py-3 rounded-lg input-field" placeholder="ej. barbie_fan99" name="nombreUsuario" [(ngModel)]="form.nombreUsuario">
            </div>
          </div>
          <div class="space-y-1.5">
            <label class="input-label">Correo Electrónico</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-[#64748B]">mail</span>
              <input type="email" class="w-full pl-11 pr-4 py-3 rounded-lg input-field" placeholder="correo@ejemplo.com" name="correoElectronico" [(ngModel)]="form.correoElectronico">
            </div>
          </div>
          <div class="space-y-1.5">
            <label class="input-label">Contraseña</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-[#64748B]">lock</span>
              <input type="password" class="w-full pl-11 pr-4 py-3 rounded-lg input-field" placeholder="••••••••" name="password" [(ngModel)]="form.password">
            </div>
          </div>
          <div class="space-y-1.5">
            <label class="input-label">Confirmar Contraseña</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-[#64748B]">lock_reset</span>
              <input type="password" class="w-full pl-11 pr-4 py-3 rounded-lg input-field" placeholder="••••••••" name="confirmPassword" [(ngModel)]="form.confirmPassword">
            </div>
          </div>
        </div>
      </section>

      <section>
        <h3 class="text-sm font-bold text-[#FF4D94] uppercase tracking-widest mb-4 flex items-center gap-2">
          <span class="material-symbols-outlined text-[18px]">person</span> Información Personal
        </h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-1.5">
            <label class="input-label">Identidad (Cédula)</label>
            <div class="flex gap-2">
              <select class="w-24 px-3 py-3 rounded-lg input-field bg-[#0F172A]" name="tipoCedula" [(ngModel)]="form.tipoCedula">
                <option value="V">V-</option>
                <option value="E">E-</option>
              </select>
              <input type="text" class="w-full px-4 py-3 rounded-lg input-field" placeholder="12345678" name="cedula" [(ngModel)]="form.cedula">
            </div>
          </div>
          <div class="space-y-1.5">
            <label class="input-label">Teléfono Móvil</label>
            <div class="flex gap-2">
              <select class="w-28 px-3 py-3 rounded-lg input-field bg-[#0F172A]" name="codigoOperadora" [(ngModel)]="form.codigoOperadora">
                <option value="414">0414</option>
                <option value="424">0424</option>
                <option value="412">0412</option>
                <option value="416">0416</option>
                <option value="426">0426</option>
              </select>
              <input type="text" class="w-full px-4 py-3 rounded-lg input-field" placeholder="1234567" name="numeroAbonado" [(ngModel)]="form.numeroAbonado">
            </div>
          </div>
          <div class="space-y-1.5">
            <label class="input-label">Primer Nombre</label>
            <input type="text" class="w-full px-4 py-3 rounded-lg input-field" placeholder="Ej. Ana" name="pNombre" [(ngModel)]="form.pNombre">
          </div>
          <div class="space-y-1.5">
            <label class="input-label">Segundo Nombre (Opcional)</label>
            <input type="text" class="w-full px-4 py-3 rounded-lg input-field" placeholder="Ej. María" name="sNombre" [(ngModel)]="form.sNombre">
          </div>
          <div class="space-y-1.5">
            <label class="input-label">Primer Apellido</label>
            <input type="text" class="w-full px-4 py-3 rounded-lg input-field" placeholder="Ej. Pérez" name="pApellido" [(ngModel)]="form.pApellido">
          </div>
          <div class="space-y-1.5">
            <label class="input-label">Segundo Apellido (Opcional)</label>
            <input type="text" class="w-full px-4 py-3 rounded-lg input-field" placeholder="Ej. Gómez" name="sApellido" [(ngModel)]="form.sApellido">
          </div>
        </div>
      </section>

      <section>
        <h3 class="text-sm font-bold text-[#FF4D94] uppercase tracking-widest mb-4 flex items-center gap-2">
          <span class="material-symbols-outlined text-[18px]">location_on</span> Ubicación y Despacho
        </h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-6">
            <div class="space-y-1.5">
              <label class="input-label">Estado</label>
              <select class="w-full px-4 py-3 rounded-lg input-field bg-[#0F172A]" name="estado" [(ngModel)]="form.idEstado" (change)="onEstadoChange()">
                <option [ngValue]="null" disabled>Seleccione un estado...</option>
                @for (est of estados; track $index) {
                    <option [ngValue]="est.idLugar">{{ est.nombre }}</option>
                }
              </select>
            </div>
            <div class="space-y-1.5">
              <label class="input-label">Municipio</label>
              <select class="w-full px-4 py-3 rounded-lg input-field bg-[#0F172A]" name="municipio" [(ngModel)]="form.idMunicipio" (change)="onMunicipioChange()" [disabled]="!form.idEstado">
                <option [ngValue]="null" disabled>Seleccione estado primero...</option>
                @for (mun of municipios; track $index) {
                    <option [ngValue]="mun.idLugar">{{ mun.nombre }}</option>
                }
              </select>
            </div>
            <div class="space-y-1.5">
              <label class="input-label">Parroquia</label>
              <select class="w-full px-4 py-3 rounded-lg input-field bg-[#0F172A]" name="parroquia" [(ngModel)]="form.idParroquia" [disabled]="!form.idMunicipio">
                <option [ngValue]="null" disabled>Seleccione municipio primero...</option>
                @for (parr of parroquias; track $index) {
                    <option [ngValue]="parr.idLugar">{{ parr.nombre }}</option>
                }
              </select>
            </div>
          </div>
          <div class="space-y-1.5">
            <label class="input-label">Dirección Exacta de Residencia</label>
            <textarea class="w-full p-4 rounded-lg input-field min-h-[220px] resize-none" placeholder="Avenida, Edificio, Casa, Apto, Punto de referencia... Esta dirección se usará para facturación." name="direccion" [(ngModel)]="form.direccion"></textarea>
          </div>
        </div>
      </section>
    </div>

    <div class="p-6 bg-[#171f33] border-t border-white/5 flex justify-end items-center gap-4">
      <a routerLink="/login" class="px-8 py-2.5 rounded-lg border border-white/20 text-[#94A3B8] hover:bg-white/5 hover:text-white transition-all font-bold text-sm">
        Cancelar
      </a>
      <button class="px-8 py-2.5 rounded-lg text-white font-bold flex items-center gap-2 text-sm btn-primary" [disabled]="loading" (click)="submit()">
        @if (loading) {
          <span class="material-symbols-outlined text-[20px] spin" style="font-variation-settings: 'FILL' 1;">progress_activity</span>
          <span>Procesando BD...</span>
        } @else {
          <span>Registrar y Continuar</span>
          <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
        }
      </button>
    </div>
  </div>
</div>
