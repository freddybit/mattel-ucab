<aside class="w-[260px] h-screen fixed left-0 top-0 flex flex-col bg-[#11112D] text-white z-50">

  <div class="px-8 py-5 flex items-center gap-4 border-b border-white/5 shrink-0">
    <div class="w-10 h-10 bg-white/10 rounded flex items-center justify-center shrink-0">
      <span class="material-symbols-outlined text-white/60">person</span>
    </div>
    <div>
      <p class="text-[11px] font-bold text-white uppercase tracking-wider">MattelUCAB PLM</p>
      <p class="text-[9px] text-slate-400 font-medium">{{ userName }}</p>
      <p class="text-[8px] text-[#E0218A] font-bold uppercase tracking-widest">{{ userRole }}</p>
    </div>
  </div>

  <nav class="flex-1 flex flex-col min-h-0" aria-label="Menú principal">
    @for (item of navItems; track item.key) {
      @if (item.enabled) {
        <a [routerLink]="item.route" [class]="linkClass(item.key)">
          <span class="material-symbols-outlined text-xl">{{ item.icon }}</span>
          <span class="text-[11px] font-bold uppercase tracking-widest">{{ item.label }}</span>
        </a>
      }
    }
  </nav>

  <div class="shrink-0 pb-6 border-t border-white/5 pt-4 bg-[#11112D]">
    <button (click)="logout()" class="flex items-center gap-4 px-8 py-3 text-slate-500 hover:text-red-500 transition-all duration-200 w-full text-left">
      <span class="material-symbols-outlined text-lg">logout</span>
      <span class="text-[10px] uppercase font-bold tracking-widest">Salir</span>
    </button>
  </div>
</aside>
