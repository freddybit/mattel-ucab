<header class="h-[72px] shrink-0 flex justify-between items-center px-10 bg-white border-b border-border-subtle shadow-sm z-40">
  <div class="flex items-center gap-10 h-full">
    <span class="text-[16px] font-bold text-industrial-maroon tracking-wider">MATTELUCAB</span>
    <nav class="flex items-center h-full gap-8">
      <a class="text-[12px] font-medium text-industrial-maroon header-nav-active h-full flex items-center px-2 bg-slate-50" href="#" (click)="$event.preventDefault()">PLM</a>
    </nav>
  </div>
  <div class="flex items-center gap-6">
    <div class="flex items-center gap-4 pr-6 border-r border-slate-100">
      <button type="button" class="w-9 h-9 flex items-center justify-center text-ebony hover:bg-slate-50 transition-colors relative">
        <span class="material-symbols-outlined">notifications</span>
      </button>
      <button type="button" class="w-9 h-9 flex items-center justify-center text-ebony hover:bg-slate-50 transition-colors">
        <span class="material-symbols-outlined">settings</span>
      </button>
    </div>
  </div>
</header>
